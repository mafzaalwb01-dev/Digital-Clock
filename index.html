<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <meta name="description" content="A beautiful digital clock with real-time display, date, and greeting message.">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Digital Clock</h1>
    <div class="box">
        <h2 class="b-heading"> &#x2600; Good Morning !</h2>
        <p class="b-ND">AM</p>
        <div class="b-time">
            <!-- Time will be inserted by JS -->
        </div>
        <div class="b-HMS">
            <h2 style="margin-left: 10px; color: #4DEEFF; text-shadow: 0 0 10px #4DEEFF, 0 0 25px #4DEEFF, 0 0 50px #4DEEFF; font-size: 23px;">Hours</h2>
            <h2 style="color: #FF6BD6; text-shadow: 0 0 10px #FF6BD6, 0 0 25px #FF6BD6, 0 0 50px #FF6BD6; margin-right: 0px; font-size: 23px;">Minutes</h2>
            <h2 style="color: #A78BFA; text-shadow: 0 0 10px #A78BFA, 0 0 25px #A78BFA, 0 0 50px #A78BFA; margin-right: 10px; font-size: 23px;">Seconds</h2>
        </div>
        <div class="b-main">
            <div class="main-l">
                <div><p class="date-text">📅 16 June 2026</p></div>
                <p class="day-text" style="color: #8B5CF6; line-height: 5px;">Thursday</p>
            </div>
            <div class="main-r">
                <button class="btn">Pakistan</button>
            </div>
        </div>
        <div class="footer">
            &#129293; Make Today Amazing ! &#129293;
        </div>
    </div>
    <script src="js/index.js"></script>
</body>
</html>
